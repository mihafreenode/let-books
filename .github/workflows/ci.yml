---
# Purpose:
# - Run the main repository validation pipeline for docs,
#   localization, generated artifacts, static-demo checks, and
#   workflow correctness.
#
# Why:
# - This repository's public product surface includes generated
#   documentation and localized content, not only application code.
#   Regressions often appear in validators, generators, or workflow
#   configuration before they appear in app code.
#
# Protects:
# - Workflow correctness, docs generation reproducibility,
#   localization completeness, semantic parity, generated artifact
#   freshness, and browser-facing docs behavior.
#
# Failure Impact:
# - Broken generators, localization leaks, stale derived artifacts,
#   or invalid workflow changes could merge unnoticed.
#
# Related:
# - .github/workflows/README.md
# - tools/validate_environment.py
# - tools/generate_docs_content.py
# - tools/validate-blog.mjs
name: CI

"on":
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            hunspell \
            jq \
            imagemagick \
            curl \
            wget \
            shellcheck \
            yamllint

      - name: Install actionlint
        run: |
          ACTIONLINT_SCRIPT_URL="https://raw.githubusercontent.com/\
          rhysd/actionlint/main/scripts/download-actionlint.bash"
          curl -sSfL "$ACTIONLINT_SCRIPT_URL" | bash
          sudo mv actionlint /usr/local/bin/

      # Workflows are part of the product's enforcement layer.
      # Validate the automation itself before trusting any later CI result.
      - name: Validate GitHub Actions workflows
        run: |
          actionlint --version
          actionlint

      - name: Validate workflow YAML
        run: yamllint .github/workflows

      - name: Install Playwright and Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Verify toolchain versions
        run: |
          python3 --version
          node --version
          npm --version
          git --version
          pandoc --version
          hunspell -v
          jq --version
          magick --version || convert --version
          npx playwright --version

      # The localization validators depend on a managed Python
      # environment with extra packages. Bootstrapping it explicitly
      # keeps local and CI behavior aligned.
      - name: Bootstrap localization Python tooling
        run: bash scripts/bootstrap-localization-tools.sh

      - name: Validate build environment
        run: python3 tools/validate_environment.py

      - name: Static-demo localization smoke test
        run: node tests/static-demo/localization-smoke.js

      - name: Validate locale JSON syntax
        run: |
          for f in static-demo/locales/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
            echo "  ok: $f"
          done

      # Fresh-artifact rule:
      # Regenerate derived metadata and docs HTML before parity review.
      # Localization findings must be based on current generated output,
      # not on stale committed artifacts from a previous run.
      - name: SEO metadata generation (dry-run validation)
        run: node tools/generate-static-seo.mjs

      - name: Generate docs content HTML
        run: python3 tools/generate_docs_content.py

      # Validate generated structure immediately after generation so
      # later parity checks run against a structurally current site.
      - name: Generated site structural validation
        run: node tools/validate-generated-site-structure.mjs

      - name: Index pages generation (dry-run validation)
        run: node tools/generate-index-pages.mjs

      - name: Topic nav generation (dry-run validation)
        run: node tools/generate-topic-nav.mjs

      - name: Sitemap generation (dry-run validation)
        run: node tools/generate-sitemap.mjs

      - name: Search index generation (dry-run validation)
        run: node tools/generate-search-index.mjs

      - name: Articles.json generation (dry-run validation)
        run: node tools/generate-articles-json.mjs

      # Review order contract:
      # generate site -> validate generated output -> inspect parity.
      # Localization coverage is only the first layer. The following
      # sequence intentionally moves from file presence to semantic
      # review to structural/source-target parity to rendered-output
      # leakage so each validator catches a different class of failure.
      # Human review should inspect generated HTML and then browser-
      # rendered output after this validation stack passes.
      - name: Documentation parity audit
        run: |
          node tools/validate-content-parity.mjs \
            --report-file docs/.content-parity-report.md \
            --json-report-file docs/.content-parity-report.json

      - name: Semantic localization review
        run: |
          node tools/validate-localized-articles.mjs \
            --require-full-coverage \
            --report-file docs/.localization-semantic-review.md \
            --json-report-file docs/.localization-semantic-review.json

      - name: Structural localization parity review
        run: |
          node tools/validate-structural-localization-parity.mjs \
            --report-file docs/.structural-localization-parity-report.md \
            --json-report-file docs/.structural-localization-parity-report.json

      - name: Translation parity validation
        run: |
          .venv/bin/python tools/validate_translation_parity.py \
            --fail-on-warnings \
            --report-file docs/.translation-parity-report.md \
            --json-report-file docs/.translation-parity-report.json

      - name: Translation warning audit
        run: |
          python3 tools/audit_translation_warnings.py \
            --json-report docs/.translation-parity-report.json \
            --summary-file docs/.translation-warning-summary.md \
            --summary-json-file docs/.translation-warning-summary.json

      - name: Localization completeness validation
        run: |
          node tools/validate-localization-completeness.mjs \
            --report-file docs/.localization-completeness-report.md \
            --json-report-file docs/.localization-completeness-report.json

      - name: Localized markdown source audit
        run: node tools/audit-localized-markdown-sources.mjs

      - name: Docs link and article validation
        run: node tools/validate-blog.mjs

      - name: Verify CNAME file
        run: |
          test -f CNAME || { echo "Missing CNAME"; exit 1; }
          grep -q "letbooks.org" CNAME

      # The SEO generator writes a manifest of required HTML outputs.
      # Checking the manifest here turns "generation completed" into a
      # stronger guarantee that every declared page is actually present
      # on disk.
      - name: Check required HTML pages exist
        run: |
          node -e "
            const m = JSON.parse(
              require('fs').readFileSync('docs/.seo-manifest.json','utf8')
            );
            let ok = true;
            for (const f of m.files) {
              if (!require('fs').existsSync(f)) {
                console.log('Missing: ' + f);
                ok = false;
              }
            }
            if (!ok) process.exit(1);
            console.log('All ' + m.files.length + ' required pages present');
          "

      - name: Check docs section index pages exist per locale
        run: |
          node -e "
            const config = JSON.parse(
              require('fs').readFileSync('tools/docs-config.json', 'utf8')
            );
            const LOCALES = config.locales;
            const SECTIONS = config.contentTypes;
            const {existsSync} = require('fs');
            let ok = true;
            for (const l of LOCALES) {
              for (const section of SECTIONS) {
                const p = 'docs/' + section + '/' + l + '/index.html';
                if (!existsSync(p)) {
                  console.log('Missing: ' + p);
                  ok = false;
                }
              }
            }
            if (ok) console.log('All docs section index pages present');
            else process.exit(1);
          "

      - name: Validate docs section index localization
        run: |
          node -e "
            const config = JSON.parse(
              require('fs').readFileSync('tools/docs-config.json', 'utf8')
            );
            const LOCALES = config.locales;
            const SECTIONS = config.contentTypes;
            const {readFileSync,existsSync} = require('fs');
            let ok = true;

            for (const section of SECTIONS) {
              for (const locale of LOCALES) {
                const p = 'docs/' + section + '/' + locale + '/index.html';
                if (!existsSync(p)) {
                  console.log('Missing: ' + p);
                  ok = false;
                  continue;
                }
                const c = readFileSync(p, 'utf8');

                // 1. Check hreflang links for all locales.
                // These indexes are language entry points, so broken
                // alternates can hide complete locale trees from
                // search engines and reviewers.
                for (const l of LOCALES) {
                  const tag = 'hreflang=\"' + l
                    + '\" href=\"https://letbooks.org/docs/'
                    + section + '/' + l + '/index.html\"';
                  if (!c.includes(tag)) {
                    console.log('MISSING hreflang ' + l + ' in: ' + p);
                    ok = false;
                  }
                }

                // 2. Check the visible language switch.
                // The repo treats docs language switching as a
                // first-class navigation path, not as optional UI
                // chrome.
                const shortLabels = {
                  en:'EN', sl:'SL', hr:'HR', bs:'BS',
                  'sr-Latn':'SR-Latn', 'sr-Cyrl':'SR-Cyrl',
                  mk:'MK', sq:'SQ', de:'DE', it:'IT', fr:'FR', es:'ES'
                };
                for (const l of LOCALES) {
                  const langLink = 'class=\"lang-link'
                    + (l === locale ? ' is-current' : '')
                    + '\" href=\"'
                    + (l === locale
                      ? 'index.html'
                      : '../../' + section + '/' + l + '/index.html')
                    + '\" lang=\"' + l + '\">' + shortLabels[l];
                  if (!c.includes(langLink)) {
                    console.log('MISSING lang-switch link for '
                      + l + ' in: ' + p);
                    ok = false;
                  }
                }

                // 3. Check footer description localization.
                // Wrapper text has historically leaked English even
                // when article bodies were localized, so this
                // explicitly guards the page chrome too.
                const footerDesc = c.match(
                  /<footer[^>]*>[\s\S]*?<p>([^<]+)<\/p>/
                );
                if (locale !== 'en' && footerDesc) {
                  const engDesc = 'A practical platform for cataloging,'
                    + ' offering, and retrieving educational books.';
                  if (footerDesc[1] === engDesc) {
                    console.log('ENGLISH footer description in'
                      + ' non-English page: '
                      + p);
                    ok = false;
                  }
                }

                // 4. Check cross-section navigation stays in the same locale.
                 const navLabels = {
                   docs: 'href=\"../../' + locale + '/index.html\"',
                   blog: 'href=\"../../blog/' + locale + '/index.html\"',
                   learning:
                     'href=\"../../learning/' + locale + '/index.html\"',
                   wiki: 'href=\"../../wiki/' + locale + '/index.html\"',
                   topics: 'href=\"../../topics/' + locale + '/index.html\"'
                 };
                for (const key of Object.keys(navLabels)) {
                  if (!c.includes(navLabels[key])) {
                    console.log('MISSING nav link for ' + key
                      + ' (' + navLabels[key] + ') in: ' + p);
                    ok = false;
                  }
                }
              }
            }

            if (ok) {
              console.log('All localization checks passed for '
                + (LOCALES.length * SECTIONS.length) + ' index pages');
            }
            else process.exit(1);
          "

      # Topic navigation is validated separately because article
      # bodies can exist and still lose the related-content system
      # after generator changes.
      - name: Check topic nav present in blog articles
        run: |
          node -e "
            const LOCALES = ['en','sl','hr','bs',
              'sr-Latn','sr-Cyrl','mk','sq',
              'de','it','fr','es'];
            const ARTICLES = [
              'spec-driven-development-in-let-books',
              'spec-driven-development-for-ai-projects',
              'documentation-is-part-of-the-product',
              'when-the-demo-is-evidence-and-when-it-is-not'
            ];
            const {readFileSync,existsSync} = require('fs');
            let ok = true;
            for (const l of LOCALES) {
              for (const a of ARTICLES) {
                const p = 'docs/blog/' + l + '/' + a + '.html';
                if (!existsSync(p)) {
                  console.log('Missing: ' + p);
                  ok = false;
                  continue;
                }
                const c = readFileSync(p, 'utf8');
                const hasModernNav = c.includes('class=\"post-article-nav\"')
                  && c.includes('class=\"related-content\"')
                  && c.includes('class=\"related-topic-nav\"');
                if (!hasModernNav) {
                  console.log('Missing related topic navigation in: ' + p);
                  ok = false;
                }
              }
            }
            if (ok) {
              console.log(
                'Related topic navigation present in all applicable articles'
              );
            }
            else process.exit(1);
          "

      # Search should index topics as first-class content, not only
      # blog/learning/wiki pages.
      - name: Validate search index includes topics
        run: |
          node -e "
            const index = JSON.parse(
              require('fs').readFileSync('docs/search-index.json', 'utf8')
            );
            if (!Array.isArray(index.entries) || index.entries.length === 0) {
              console.log('Search index missing entries');
              process.exit(1);
            }
            const hasTopics = index.entries.some(
              (entry) => entry.contentType === 'topics'
            );
            if (!hasTopics) {
              console.log('Search index missing topics entries');
              process.exit(1);
            }
            console.log('Search index includes topics entries');
          "

      # Serve generated output locally before browser-facing checks.
      # File-level validators do not catch print/layout regressions
      # that only appear once pages are loaded in a browser.
      - name: Docs browser validation
        run: |
          set -euo pipefail

          EXPECTED_PAGE="docs/blog/en/documentation-is-part-of-the-product.html"
          EXPECTED_URL="http://127.0.0.1:4173/$EXPECTED_PAGE"

          test -f "$EXPECTED_PAGE" || {
            echo "Missing expected generated page:"
            echo "  $EXPECTED_PAGE"
            exit 1
          }

          # Preserve the local server log on failure so rendering and
          # asset-loading problems can be diagnosed from CI output
          # instead of reproduced from scratch.
          cleanup() {
            if [ -n "${SERVER_PID:-}" ] \
              && kill -0 "$SERVER_PID" 2>/dev/null; then
              kill "$SERVER_PID"
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }

          show_server_log() {
            if [ -f /tmp/letbooks-print.log ]; then
              echo "---- /tmp/letbooks-print.log ----"
              cat /tmp/letbooks-print.log
              echo "---- end server log ----"
            fi
          }

          trap 'show_server_log; cleanup' ERR
          trap cleanup EXIT

          python3 -m http.server 4173 \
            --bind 127.0.0.1 \
            --directory . \
            >/tmp/letbooks-print.log 2>&1 &
          SERVER_PID=$!

          for i in {1..30}; do
            if curl -fsS \
              "$EXPECTED_URL" \
              >/dev/null; then
              break
            fi
            sleep 1
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for local docs server"
              show_server_log
              exit 1
            fi
          done

          DOCS_BASE_URL=http://127.0.0.1:4173 \
            python3 tools/validate_layout_structure.py
          node tests/docs/print-validation.cjs

      - name: Publish validation summary
        run: |
          {
            echo "## CI Validation Summary"
            echo
            echo "- ✓ actionlint passed"
            echo "- ✓ yamllint passed"
            echo "- ✓ docs generation passed"
            echo "- ✓ layout validation passed"
            echo "- ✓ print validation passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check favicon manifest
        run: |
          node -e "
            JSON.parse(
              require('fs').readFileSync('favicon/site.webmanifest','utf8')
            );
          "

      - name: Validate JSON files (non-locale)
        run: |
          for f in playwright-cli.json static-demo/manifest.webmanifest; do
            test -f "$f" \
              && node -e "
                JSON.parse(
                  require('fs').readFileSync('$f','utf8')
                );
              " \
              && echo "  ok: $f"
          done

      # These are currently advisory checks. They preserve operational
      # memory about desirable future guarantees without blocking
      # merges on tooling that is not fully wired yet.
      - name: Hunspell check (optional)
        continue-on-error: true
        run: |
          if command -v hunspell &>/dev/null; then
            echo "Hunspell available — spellcheck not yet wired per-locale"
            hunspell -d en_US -l docs/en/*.html 2>/dev/null \
              | sort -u \
              | head -20 \
              || true
          else
            echo "  skipped: hunspell not available"
          fi

      - name: Broken internal link check (optional)
        continue-on-error: true
        run: |
          if command -v linkchecker &>/dev/null; then
            echo "Running linkchecker on docs/ ..."
          elif node -e "
            require('fs').existsSync('node_modules')
          " 2>/dev/null; then
            echo "linkinator not installed — skipped"
          else
            echo "  skipped: no link checker available"
          fi
