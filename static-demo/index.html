<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>LetBooks Static Demo | Local-first mobile book workflow</title>
    <meta name="description" content="Try the LetBooks static demo: a local-first mobile web app for cataloging boxes and books, scanning codes, and exporting donation data.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="application-name" content="LetBooks">
    <link rel="canonical" href="https://letbooks.org/static-demo/">
    <link rel="icon" href="/favicon/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon/favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="/favicon/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="/favicon/favicon-16x16.png" type="image/png" sizes="16x16">
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" sizes="180x180">
    <meta name="theme-color" content="#0f5b45">
    <meta property="og:title" content="LetBooks Static Demo | Local-first mobile book workflow">
    <meta property="og:description" content="Try the LetBooks static demo: a local-first mobile web app for cataloging boxes and books, scanning codes, and exporting donation data.">
    <meta property="og:image" content="https://letbooks.org/og-image.png">
    <meta property="og:image:alt" content="LetBooks social preview image">
    <meta property="og:url" content="https://letbooks.org/static-demo/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LetBooks">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LetBooks Static Demo | Local-first mobile book workflow">
    <meta name="twitter:description" content="Try the LetBooks static demo: a local-first mobile web app for cataloging boxes and books, scanning codes, and exporting donation data.">
    <meta name="twitter:image" content="https://letbooks.org/og-image.png">
    <meta name="twitter:image:alt" content="LetBooks social preview image">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="app.css">
  </head>
  <body class="app-booting">
    <div class="boot-splash" id="boot-splash" aria-hidden="true">
      <div class="boot-splash-mark-wrap">
        <img class="boot-splash-mark" src="icons/app-mark.svg" alt="Let Books">
      </div>
      <strong class="boot-splash-title">Let Books</strong>
      <div class="boot-splash-subtitle is-pending" id="boot-splash-subtitle"></div>
    </div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-wrap">
          <img class="brand-mark" src="icons/app-mark.svg" alt="Let Books">
          <div>
            <strong class="brand-title">Let Books</strong>
            <div class="brand-subtitle" id="brand-subtitle">Books, boxes, and export</div>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="add-menu-wrap">
            <button class="icon-button" id="add-menu-button" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Add">
              <span class="icon">+</span>
            </button>
            <div class="add-menu" id="add-menu" hidden role="menu"></div>
          </div>
          <div class="language-picker">
            <button class="language-trigger" id="language-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <img src="icons/language-globe.svg" alt="">
              <span id="language-label">English</span>
            </button>
            <div class="language-menu" id="language-menu" hidden role="listbox" aria-label="Language selection"></div>
          </div>
        </div>
      </header>

      <section class="demo-banner">
        <div class="banner-copy banner-copy-compact">
          <strong id="demo-disclaimer-title">Browser-only pilot. Data stays on this device.</strong>
        </div>
      </section>

      <main id="app-root" class="app-main" aria-live="polite"></main>

      <nav class="bottom-nav" aria-label="Primary">
        <a href="#/dashboard" data-nav="dashboard" class="bottom-nav-link is-current">
          <span class="bottom-nav-icon" aria-hidden="true"><img src="icons/app-mark.svg" alt=""></span>
          <span data-i18n="nav.dashboardShort">Home</span>
        </a>
        <a href="#/boxes" data-nav="boxes" class="bottom-nav-link">
          <span class="bottom-nav-icon" aria-hidden="true"><img src="icons/box.svg" alt=""></span>
          <span data-i18n="nav.boxesShort">Boxes</span>
        </a>
        <a href="#/scanner" data-nav="scanner" class="bottom-nav-link bottom-nav-link-accent">
          <span class="bottom-nav-icon" aria-hidden="true"><img src="icons/scan.svg" alt=""></span>
          <span data-i18n="nav.scanShort">Scan</span>
        </a>
        <a href="#/export" data-nav="export" class="bottom-nav-link">
          <span class="bottom-nav-icon" aria-hidden="true"><img src="icons/export.svg" alt=""></span>
          <span data-i18n="nav.exportShort">Files</span>
        </a>
        <a href="#/settings" data-nav="settings" class="bottom-nav-link">
          <span class="bottom-nav-icon" aria-hidden="true"><img src="icons/language-globe.svg" alt=""></span>
          <span data-i18n="nav.moreShort">More</span>
        </a>
      </nav>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" aria-live="assertive"></div>

    <script src="vendor/dexie.min.js"></script>
    <script src="vendor/html5-qrcode.min.js"></script>
    <script src="vendor/qrcode.min.js"></script>
    <script src="vendor/xlsx.full.min.js"></script>
    <script src="vendor/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
  </html>
